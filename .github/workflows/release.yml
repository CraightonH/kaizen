# .github/workflows/release.yml
# Tag-triggered release. Cross-compiles all 4 targets on Linux runners,
# generates SHA256SUMS, and publishes a GitHub Release with the binaries.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Validate tag format
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+.*$'; then
            echo "Tag '$tag' does not match v<major>.<minor>.<patch>[-suffix]" >&2
            exit 1
          fi

  test:
    needs: validate-tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun x tsc --noEmit
      - run: bun test

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: bun-darwin-x64
            outfile: kaizen-darwin-x64
          - target: bun-darwin-arm64
            outfile: kaizen-darwin-arm64
          - target: bun-linux-x64
            outfile: kaizen-linux-x64
          - target: bun-linux-arm64
            outfile: kaizen-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Compile ${{ matrix.target }}
        run: bun build --compile --target=${{ matrix.target }} ./src/cli.ts --outfile ${{ matrix.outfile }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.outfile }}
          path: ${{ matrix.outfile }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum kaizen-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
            dist/kaizen-* \
            dist/SHA256SUMS
