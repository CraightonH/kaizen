# .github/workflows/release.yml
# Tag-triggered release. Compiles all 4 targets, generates SHA256SUMS, and
# publishes a GitHub Release with binaries + install.sh.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Validate tag format
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+.*$'; then
            echo "Tag '$tag' does not match v<major>.<minor>.<patch>[-suffix]" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        id: validate

  build:
    needs: validate-tag
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: darwin
            arch: x64
            runner: macos-13
            target: bun-darwin-x64
            outfile: kaizen-darwin-x64
          - os: darwin
            arch: arm64
            runner: macos-14
            target: bun-darwin-arm64
            outfile: kaizen-darwin-arm64
          - os: linux
            arch: x64
            runner: ubuntu-latest
            target: bun-linux-x64
            outfile: kaizen-linux-x64
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            outfile: kaizen-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Compile ${{ matrix.target }}
        run: bun build --compile --target=${{ matrix.target }} ./src/cli.ts --outfile ${{ matrix.outfile }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.outfile }}
          path: ${{ matrix.outfile }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum kaizen-* > SHA256SUMS

      - name: Stage install.sh
        run: cp scripts/install.sh dist/install.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --generate-notes \
            dist/kaizen-* \
            dist/SHA256SUMS \
            dist/install.sh
