# .github/workflows/ci-master.yml
# Runs on every master push touching source/test files. Keeps master green
# via typecheck, test suite, and installer shell test. Compile matrix runs
# at release time (see release.yml).
name: ci-master

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/build-*.sh'
      - 'scripts/build-*.ts'
      - 'scripts/install.sh'
      - 'scripts/smoke-install.sh'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig*.json'
      - '.github/workflows/ci-pr.yml'
      - '.github/workflows/ci-master.yml'
      - '.github/workflows/release.yml'

concurrency:
  group: ci-master-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - name: Installer shell test
        run: bash tests/install-sh-test.sh
